# fly.toml app configuration file generated for cv-makershakes-bot
app = 'cv-makershakes-bot'
primary_region = 'jnb'

[build]

[env]
  CLAUDE_MODEL = 'claude-sonnet-4-20250514'
  MAX_HISTORY = '20'
  SYSTEM_PROMPT = "You are Shakespear Samu's personal AI career assistant on Telegram. You have his complete professional profile loaded. You can generate tailored CV/resume PDFs using the generate_cv_pdf tool. When asked to create a CV, tailor it to the target role - adjust the summary, select relevant skills, and reorder experience. If a job description is provided, match its keywords. Always ask for contact details (phone, email) if not provided. Be concise and professional."

[processes]
  app = "python bot.py"

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  auto_stop_machines = false
